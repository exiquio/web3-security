---
- name: Provision Web3 Audit Environment
  hosts: web3
  become: yes
  tasks:
    - name: Wait for cloud-init to finish
      shell: |
        cloud-init status --wait 2>&1 || true

    - name: Ensure base packages (safety net if cloud-init timed out)
      dnf:
        name:
          - zsh
          - neovim
          - git
          - gcc
          - make
          - python3
          - unzip
          - golang
          - pandoc
          - openssl-devel
          - pkgconf-pkg-config
          - bzip2
        state: present

    - name: Set web3 shell to zsh
      user:
        name: web3
        shell: /bin/zsh

    - name: Install Oh My Zsh
      become_user: web3
      shell: |
        sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended
      args:
        creates: ~/.oh-my-zsh

    - name: Install Rust and Cargo
      become_user: web3
      shell: |
        curl https://sh.rustup.rs -sSf | sh -s -- -y
      args:
        creates: ~/.cargo/bin/rustc

    - name: Install mise
      become_user: web3
      shell: |
        curl https://mise.run | sh
      args:
        creates: ~/.local/bin/mise

    - name: Install typst-cli
      become_user: web3
      shell: |
        PATH="$HOME/.cargo/bin:$PATH" cargo install --locked typst-cli
      args:
        creates: ~/.cargo/bin/typst

    - name: Install sd
      become_user: web3
      shell: |
        PATH="$HOME/.cargo/bin:$PATH" cargo install sd
      args:
        creates: ~/.cargo/bin/sd

    - name: Install pnpm via mise
      become_user: web3
      shell: |
        ~/.local/bin/mise use -g pnpm@latest
      args:
        creates: ~/.local/bin/pnpm

    - name: Install Node.js via mise
      become_user: web3
      shell: |
        ~/.local/bin/mise use -g node@latest
      args:
        creates: ~/.local/bin/node

    - name: Install uv
      become_user: web3
      shell: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
      args:
        creates: ~/.local/bin/uv

    - name: Install scc
      become_user: web3
      shell: |
        go install github.com/boyter/scc/v3@latest
      args:
        creates: ~/go/bin/scc

    - name: Install Goose AI
      become_user: web3
      shell: |
        curl -fsSL https://github.com/aaif-goose/goose/releases/download/stable/download_cli.sh | CONFIGURE=false bash
      args:
        creates: ~/.local/bin/goose

    - name: Install Foundry as web3
      become_user: web3
      shell: |
        curl -L https://getfoundry.sh/install | bash
        ~/.foundry/bin/foundryup
      args:
        creates: ~/.foundry/bin/forge

    - name: Install solc-select via uv
      become_user: web3
      shell: |
        ~/.local/bin/uv tool install solc-select
      args:
        creates: ~/.local/bin/solc-select

    - name: Install slither-analyzer via uv
      become_user: web3
      shell: |
        ~/.local/bin/uv tool install slither-analyzer
      args:
        creates: ~/.local/bin/slither

    - name: Create LiteLLM env vars in .zshenv (for non-interactive shells)
      become_user: web3
      blockinfile:
        path: ~/.zshenv
        create: yes
        block: |
          export LITELLM_HOST="http://192.168.122.1:4000"
          export LITELLM_API_KEY="sk-dummy-key-does-not-matter"
          export GOOSE_MODE=smart_approve
          export GOOSE_CONTEXT_LIMIT=128000
          export PATH="$HOME/.foundry/bin:$HOME/.local/bin:$HOME/.cargo/bin:$HOME/go/bin:$PATH"
          eval "$(mise activate zsh)"

    - name: Append same block to .zshrc for interactive shells
      become_user: web3
      blockinfile:
        path: ~/.zshrc
        block: |
          export LITELLM_HOST="http://192.168.122.1:4000"
          export LITELLM_API_KEY="sk-dummy-key-does-not-matter"
          export GOOSE_MODE=smart_approve
          export GOOSE_CONTEXT_LIMIT=128000
          export PATH="$HOME/.foundry/bin:$HOME/.local/bin:$HOME/.cargo/bin:$HOME/go/bin:$PATH"
          eval "$(mise activate zsh)"

    - name: Create Goose config directory
      become_user: web3
      file:
        path: ~/.config/goose
        state: directory

    - name: Create Goose provider config
      become_user: web3
      copy:
        dest: ~/.config/goose/config.yaml
        content: |
          GOOSE_MODE: smart_approve
          GOOSE_TELEMETRY_ENABLED: false
          active_provider: litellm
          providers:
            litellm:
              enabled: true
              model: deepseek/deepseek-v4-pro
              configured: true
