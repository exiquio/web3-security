---
- name: Provision Web3 Audit Environment
  hosts: web3
  become: yes
  tasks:
    - name: Wait for cloud-init to finish
      shell: |
        cloud-init status --wait 2>&1 || true

    - name: Ensure base packages (safety net if cloud-init timed out)
      dnf:
        name:
          - fish
          - neovim
          - git
          - gcc
          - gcc-c++
          - make
          - autoconf
          - automake
          - python3
          - unzip
          - golang
          - pandoc
          - ncurses-devel
          - libicu-devel
          - openssl-devel
          - pkgconf-pkg-config
          - bzip2
          - perl
        state: present

    - name: Install GitHub CLI via official repo
      shell: |
        dnf install -y 'dnf-command(config-manager)'
        dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
        dnf install -y gh
      args:
        creates: /usr/bin/gh

    - name: Set web3 shell to fish
      user:
        name: web3
        shell: /usr/bin/fish

    - name: Create fish config directory
      become_user: web3
      file:
        path: ~/.config/fish
        state: directory
        mode: "0755"

    - name: Configure Starship prompt
      become_user: web3
      copy:
        dest: ~/.config/starship.toml
        content: |
          [directory]
          truncation_length = 5
          fish_style_pwd_dir_length = 1

          [git_branch]
          style = "bold #7aa2f7"

          [git_status]
          style = "bold #e0af68"

          [cmd_duration]
          min_time = 2000
          style = "#565f89"

          [status]
          style = "bold #f7768e"
          disabled = false

          [character]
          success_symbol = "[╰─](bold #9ece6a)"
          error_symbol = "[╰─](bold #f7768e)"

          [container]
          disabled = true

          [python]
          symbol = "🐍 "

          [rust]
          symbol = "⚙️ "

          [golang]
          symbol = "🐹 "

          [nodejs]
          symbol = "⬢ "

          [elixir]
          symbol = "💧 "

    - name: Install glow
      become_user: web3
      shell: |
        curl -fsSL https://raw.githubusercontent.com/charmbracelet/glow/main/install.sh | bash
      args:
        creates: ~/.local/bin/glow

    - name: Install Rust and Cargo
      become_user: web3
      shell: |
        curl https://sh.rustup.rs -sSf | sh -s -- -y
      args:
        creates: ~/.cargo/bin/rustc

    - name: Install mise
      become_user: web3
      shell: |
        curl https://mise.run | sh
      args:
        creates: ~/.local/bin/mise

    - name: Install typst-cli
      become_user: web3
      shell: |
        PATH="$HOME/.cargo/bin:$PATH" cargo install --locked typst-cli
      args:
        creates: ~/.cargo/bin/typst

    - name: Install sd
      become_user: web3
      shell: |
        PATH="$HOME/.cargo/bin:$PATH" cargo install sd
      args:
        creates: ~/.cargo/bin/sd

    - name: Install Starship prompt
      become_user: web3
      shell: |
        PATH="$HOME/.cargo/bin:$PATH" cargo install starship --locked
      args:
        creates: ~/.cargo/bin/starship

    - name: Install pnpm via mise
      become_user: web3
      shell: |
        ~/.local/bin/mise use -g pnpm@latest
      args:
        creates: ~/.local/bin/pnpm

    - name: Install Node.js via mise
      become_user: web3
      shell: |
        ~/.local/bin/mise use -g node@latest
      args:
        creates: ~/.local/bin/node

    - name: Install Erlang via mise
      become_user: web3
      shell: |
        ~/.local/bin/mise use -g erlang@latest
      args:
        creates: ~/.local/share/mise/shims/erl

    - name: Install Elixir via mise
      become_user: web3
      shell: |
        ~/.local/bin/mise use -g elixir@latest
      args:
        creates: ~/.local/share/mise/shims/elixir

    - name: Install uv
      become_user: web3
      shell: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
      args:
        creates: ~/.local/bin/uv

    - name: Install scc
      become_user: web3
      shell: |
        go install github.com/boyter/scc/v3@latest
      args:
        creates: ~/go/bin/scc

    - name: Install Goose AI
      become_user: web3
      shell: |
        curl -fsSL https://github.com/aaif-goose/goose/releases/download/stable/download_cli.sh | CONFIGURE=false bash
      args:
        creates: ~/.local/bin/goose

    - name: Install Foundry as web3
      become_user: web3
      shell: |
        curl -L https://getfoundry.sh/install | bash
        ~/.foundry/bin/foundryup
      args:
        creates: ~/.foundry/bin/forge

    - name: Install solc-select via uv
      become_user: web3
      shell: |
        ~/.local/bin/uv tool install solc-select
      args:
        creates: ~/.local/bin/solc-select

    - name: Install slither-analyzer via uv
      become_user: web3
      shell: |
        ~/.local/bin/uv tool install slither-analyzer
      args:
        creates: ~/.local/bin/slither

    - name: Configure fish shell
      become_user: web3
      copy:
        dest: ~/.config/fish/config.fish
        content: |
          # ── Environment ──────────────────────────────────────────────
          set -gx LITELLM_HOST "http://192.168.122.1:4000"
          set -gx LITELLM_API_KEY "sk-dummy-key-does-not-matter"
          set -gx GOOSE_MODE smart_approve
          set -gx GOOSE_CONTEXT_LIMIT 128000

          # ── PATH ────────────────────────────────────────────────────
          fish_add_path --prepend $HOME/scripts
          fish_add_path --prepend $HOME/.foundry/bin
          fish_add_path --prepend $HOME/.local/bin
          fish_add_path --prepend $HOME/.cargo/bin
          fish_add_path --prepend $HOME/go/bin

          # ── mise ────────────────────────────────────────────────────
          if test -f $HOME/.local/bin/mise
              $HOME/.local/bin/mise activate fish | source
          end

          # ── Sane defaults ───────────────────────────────────────────
          # History
          set -g fish_history_dir $HOME/.local/share/fish/history
          set -g fish_history_max 100000

          # Disable greeting
          set -g fish_greeting

          # ── Aliases for web3 audit work ─────────────────────────────
          # Foundry
          alias f="forge"
          alias c="cast"
          alias a="anvil"
          alias fb="forge build"
          alias ft="forge test"
          alias fft="forge test --fork-url $FORK_URL"
          alias fc="forge coverage"
          alias finspect="forge inspect"
          alias fsize="forge build --sizes"

          # Solidity
          alias solc-select="solc-select"
          alias slither="slither"

          # Git shorthand
          alias g="git"
          alias gs="git status"
          alias gd="git diff"
          alias gl="git log --oneline --graph --decorate -20"
          alias gp="git push"
          alias gco="git checkout"

          # Navigation
          alias ..="cd .."
          alias ...="cd ../.."
          alias ls="ls -la --color=auto"
          alias ll="ls -la --color=auto"
          alias tree="tree -C"

          # ── Functions ───────────────────────────────────────────────
          function audit-init
              mkdir -p findings/{critical,high,medium,low,info,gas}
              echo "# Audit Report" > report.md
              echo "Audit dir ready."
          end

          function forge-summary
              forge build --sizes 2>&1 | tail -20
          end

          # ── Prompt (Starship) ─────────────────────────────────────
          if test -f $HOME/.cargo/bin/starship
              $HOME/.cargo/bin/starship init fish | source
          end

    - name: Create Goose config directory
      become_user: web3
      file:
        path: ~/.config/goose
        state: directory

    - name: Create audit working directory
      become_user: web3
      file:
        path: ~/audit
        state: directory
        mode: "0755"
